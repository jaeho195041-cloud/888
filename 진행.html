<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 진행 상황</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .progress-container { width: 100%; background-color: #f3f3f3; border-radius: 10px; margin-bottom: 20px; }
        .progress-bar { width: 0%; height: 30px; background-color: #4CAF50; border-radius: 10px; text-align: center; line-height: 30px; color: white; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .completed { background-color: #e8f5e9; text-decoration: line-through; color: #4caf50; }
    </style>
</head>
<body>
    <h1>프로젝트 진행률: 40%</h1>
    <div class="progress-container">
        <div class="progress-bar" style="width: 40%;">40%</div>
    </div>

    <h2>단위 작업 목록</h2>
    <ul>
        <li class="completed">1. 프로젝트 환경 설정 및 데이터베이스 연동 (Node.js, Express, Neon)</li>
        <li class="completed">2. 회원 인증 시스템 (회원가입, 로그인, 자동 로그인)</li>
        <li>3. 게시글 관리 기능 (CRUD)</li>
        <li>4. 댓글 시스템 (CRUD)</li>
        <li>5. 추천 기능 및 UI/UX 마무리</li>
    </ul>
</body>
</html>
